<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame | The Mathsters Alliance</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --obsidian: #0a0c10; --bronze: #a67c52; --gold: #d4af37; --silver: #c0c0c0; }
        body { margin: 0; background: var(--obsidian); color: #e0e0e0; font-family: 'Inter', sans-serif; text-align: center; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1d23 0%, #0a0c10 100%); z-index: -1; }
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 20px; }

        .page-header h1 { font-family: 'Syncopate', sans-serif; color: var(--bronze); letter-spacing: 12px; }

        /* PODIUM LAYOUT */
        .podium { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 60px 0; }
        .spot { background: rgba(255,255,255,0.03); border: 1px solid rgba(166, 124, 82, 0.2); border-radius: 15px; padding: 30px 15px; width: 200px; transition: 0.4s; }
        .spot:hover { transform: translateY(-10px); background: rgba(166, 124, 82, 0.05); }
        
        .gold { height: 320px; border-color: var(--gold); }
        .silver { height: 260px; border-color: var(--silver); }
        .bronze { height: 220px; border-color: var(--bronze); }

        .medal { font-size: 2rem; margin-bottom: 15px; display: block; }
        .name { font-family: 'Syncopate', sans-serif; font-size: 0.8rem; display: block; margin-bottom: 5px; }
        .year { font-size: 0.7rem; color: #666; }

        /* STANDARDS SECTION */
        .standards { background: rgba(255,255,255,0.02); padding: 40px; border-radius: 15px; text-align: left; max-width: 700px; margin: 0 auto; border: 1px dashed rgba(255,255,255,0.1); }
        .standards h2 { font-family: 'Syncopate', sans-serif; color: var(--bronze); font-size: 1rem; margin-bottom: 20px; }
        .standards ul { list-style: none; padding: 0; }
        .standards li { margin-bottom: 15px; padding-left: 25px; position: relative; color: #999; line-height: 1.6; }
        .standards li::before { content: '◈'; position: absolute; left: 0; color: var(--bronze); }

        @media (max-width: 700px) { .podium { flex-direction: column; align-items: center; } .spot { height: auto !important; width: 100%; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header class="page-header">
            <h1>HALL OF FAME</h1>
            <div class="divider" style="height: 2px; width: 60px; background: var(--bronze); margin: 20px auto;"></div>
        </header>

        <div class="podium">
            <div class="spot silver">
                <span class="medal">🥈</span>
                <span class="name">Candidate B</span>
                <span class="year">Class of 2025</span>
            </div>
            <div class="spot gold">
                <span class="medal">🥇</span>
                <span class="name">Candidate A</span>
                <span class="year">Class of 2025</span>
            </div>
            <div class="spot bronze">
                <span class="medal">🥉</span>
                <span class="name">Candidate C</span>
                <span class="year">Class of 2025</span>
            </div>
        </div>

        <section class="standards">
            <h2>ADMISSION REQUIREMENTS</h2>
            <ul>
               
            </ul>
        </section>
    </div>
</body>
</html>
