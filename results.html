<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --obsidian: #0a0c10; --bronze: #a67c52; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--obsidian); color: #e0e0e0; font-family: 'Inter', sans-serif; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { font-family: 'Syncopate', sans-serif; font-size: 0.7rem; color: var(--bronze); padding: 20px; border-bottom: 1px solid rgba(166, 124, 82, 0.3); text-align: left; }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .rank-high { color: var(--bronze); font-weight: bold; }
    </style>
</head>
